<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BZ Reaction-Diffusion — Portfolio Prototype</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #08090c; overflow: hidden; }
canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; }

/* Project labels */
#nodes {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 5;
}
.nlabel {
  position: absolute;
  transform: translate(-50%, 26px);
  font: 400 13px/1 "JetBrains Mono", "Fira Mono", monospace;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: #e4e8f2;
  white-space: nowrap;
  pointer-events: auto;
  cursor: pointer;
  opacity: 0.85;
  transition: opacity 0.12s;
  text-shadow: 0 0 10px rgba(0,0,0,0.85), 0 1px 4px rgba(0,0,0,0.95);
}
.nlabel:hover { opacity: 1; letter-spacing: 0.22em; }

#hud {
  position: fixed; bottom: 18px; left: 20px; z-index: 10;
  color: #2e333e; font: 10px/2 "JetBrains Mono", monospace;
  pointer-events: none; user-select: none;
}
#hud b { color: #252830; font-weight: 400; }

/* Parameter panel */
#params {
  position: fixed; bottom: 18px; right: 20px; z-index: 10;
  color: #3a404d; font: 10px/1.9 "JetBrains Mono", monospace;
  display: flex; flex-direction: column; gap: 5px; align-items: flex-end;
}
.presets { display: flex; gap: 5px; }
#params button {
  background: none; border: 1px solid #1a1e28; color: #3a404d;
  font: 9px "JetBrains Mono", monospace; padding: 2px 8px; cursor: pointer;
  letter-spacing: 0.1em; text-transform: uppercase;
  transition: color 0.1s, border-color 0.1s;
}
#params button:hover    { color: #7a8090; border-color: #2e333e; }
#params button.active   { color: #e8c44a; border-color: #e8c44a; }
#params label {
  display: flex; align-items: center; gap: 8px;
}
#params input[type=range] {
  width: 80px; height: 2px; -webkit-appearance: none;
  background: #1a1e28; outline: none; border-radius: 2px;
  accent-color: #e8c44a;
}
#params input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 8px; height: 8px;
  border-radius: 50%; background: #e8c44a; cursor: pointer;
}
.pval { color: #50576a; min-width: 36px; text-align: right; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="nodes"></div>
<div id="hud">barkley-rd · <b id="fps">—</b> fps</div>
<div id="params">
  <div class="presets">
    <button id="bSpiral"  class="active">spirals</button>
    <button id="bTarget">target</button>
    <button id="bTurb">turbulent</button>
    <button id="bReset">reset</button>
  </div>
  <label>ε <input type="range" id="sEps" min="0.010" max="0.120" step="0.001" value="0.025"><span class="pval" id="vEps">0.025</span></label>
  <label>a <input type="range" id="sA"   min="0.40"  max="1.20"  step="0.010" value="0.75"> <span class="pval" id="vA">0.750</span></label>
  <label>b <input type="range" id="sB"   min="0.000" max="0.200" step="0.005" value="0.010"><span class="pval" id="vB">0.010</span></label>
</div>

<script>
'use strict';

// ─── Config ───────────────────────────────────────────────────────────────
const SIM_SCALE = 0.75;   // trail texture fraction of screen size
const SUBSTEPS  = 4;       // RD steps per animation frame
const SEED_R    = 8;       // seed disk radius (trail-space px) at project nodes

const P = {
  eps: 0.025, a: 0.75, b: 0.01,  // Barkley params
  Du : 0.25,  dt: 0.10,           // diffusion & timestep
  mouseRad: 18,                    // excitation radius (trail-space px)
};

// Project nodes — GL convention (y=0 bottom)
const PROJECTS = [
  { slug: 'e30',      x: 0.50, y: 0.60 },
  { slug: 'glasses',  x: 0.30, y: 0.38 },
  { slug: 'reel',     x: 0.70, y: 0.38 },
  { slug: 'hda',      x: 0.22, y: 0.65 },
  { slug: 'ai-pipe',  x: 0.78, y: 0.65 },
];

// Obstacles — CSS convention (y=0 top); buildWallTex() handles Y-flip
const OBSTACLES = [
  { type: 'text', text: 'LÖFFLER', cx: 0.50, cy: 0.500, size: 88 },
];

// ─── Canvas / WebGL2 ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false, powerPreference: 'high-performance' });
if (!gl) { die('WebGL2 not supported.'); throw 0; }
if (!gl.getExtension('EXT_color_buffer_float')) { die('EXT_color_buffer_float missing.'); throw 0; }
function die(m) { document.body.innerHTML = `<p style="color:#e4e8f2;padding:2rem;font-family:monospace">${m}</p>`; }
gl.disable(gl.DEPTH_TEST);
gl.disable(gl.STENCIL_TEST);

let TW, TH;
function setSize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  TW = Math.max(1, Math.floor(canvas.width  * SIM_SCALE));
  TH = Math.max(1, Math.floor(canvas.height * SIM_SCALE));
}
setSize();

// ─── GLSL ─────────────────────────────────────────────────────────────────

const QUAD_VS = `#version 300 es
layout(location=0) in vec2 aPos;
out vec2 vUv;
void main() { vUv = aPos*0.5+0.5; gl_Position = vec4(aPos,0,1); }`;

// ── Barkley excitable-medium reaction-diffusion ───────────────────────────
// State texture: RG32F — u = R (activator), v = G (inhibitor)
// Equations (Barkley 1991):
//   ∂u/∂t = (1/ε)·u·(1-u)·(u − (v+b)/a) + Du·∇²u
//   ∂v/∂t = u − v
// Produces spiral / target waves (BZ-reaction aesthetic).
const REACT_FS = `#version 300 es
precision highp float;
uniform sampler2D uState;    // RG32F: u=R, v=G
uniform sampler2D uWall;     // R8:   obstacle mask (1=wall)
uniform float uEps, uA, uB, uDu, uDt;
uniform vec2  uMPos;         // mouse pos in trail-space pixels
uniform float uMRad;
uniform int   uMAct;
in vec2 vUv;
out vec4 fragColor;

void main() {
  // Wall pixels: held at zero (absorbing boundary inside obstacles)
  if (texture(uWall, vUv).r > 0.5) {
    fragColor = vec4(0.0, 0.0, 0.0, 1.0);
    return;
  }

  // Mouse: inject fresh excitation at cursor position
  if (uMAct == 1) {
    vec2 fp = vUv * vec2(textureSize(uState, 0));
    if (length(fp - uMPos) < uMRad) {
      fragColor = vec4(1.0, 0.0, 0.0, 1.0);
      return;
    }
  }

  vec2  px = 1.0 / vec2(textureSize(uState, 0));
  float u  = texture(uState, vUv).r;
  float v  = texture(uState, vUv).g;

  // Zero-flux Laplacian: if a neighbour is a wall, reflect (use current u)
  // CLAMP_TO_EDGE already handles canvas-edge reflection automatically.
  vec2 p1 = vec2(px.x, 0.0), p2 = vec2(0.0, px.y);
  float uR = mix(texture(uState, vUv+p1).r, u, step(0.5, texture(uWall, vUv+p1).r));
  float uL = mix(texture(uState, vUv-p1).r, u, step(0.5, texture(uWall, vUv-p1).r));
  float uU = mix(texture(uState, vUv+p2).r, u, step(0.5, texture(uWall, vUv+p2).r));
  float uD = mix(texture(uState, vUv-p2).r, u, step(0.5, texture(uWall, vUv-p2).r));
  float lap_u = uR + uL + uU + uD - 4.0*u;

  // Barkley reaction terms
  float thresh = (v + uB) / uA;
  float du = (1.0/uEps) * u*(1.0-u)*(u - thresh) + uDu*lap_u;
  float dv = u - v;

  fragColor = vec4(
    clamp(u + uDt*du, 0.0, 1.0),
    clamp(v + uDt*dv, 0.0, 1.0),
    0.0, 1.0
  );
}`;

// ── Display ───────────────────────────────────────────────────────────────
// Manual bilinear upsampling avoids NEAREST-filter pixel-block artifacts.
// Colormap: dark bg → gold/amber (excited u) | deep blue (refractory v).
// Node markers rendered analytically as ring overlays.
const DISPLAY_FS = `#version 300 es
precision highp float;
uniform sampler2D uState;
uniform int   uNC;
uniform vec2  uNP[8];
uniform float uAR;
in vec2 vUv;
out vec4 fragColor;

vec2 bilinear(vec2 uv) {
  vec2 sz = vec2(textureSize(uState, 0));
  vec2 px = uv*sz - 0.5;
  vec2 f  = fract(px);
  vec2 b  = (floor(px)+0.5)/sz;
  vec2 s  = 1.0/sz;
  vec2 tl = texture(uState, b).rg;
  vec2 tr = texture(uState, b+vec2(s.x, 0)).rg;
  vec2 bl = texture(uState, b+vec2(0, s.y)).rg;
  vec2 br = texture(uState, b+s).rg;
  return mix(mix(tl,tr,f.x), mix(bl,br,f.x), f.y);
}

void main() {
  vec2  st = bilinear(vUv);
  float u  = st.r;
  float v  = st.g;

  // Colour palette: BZ-reaction / Arte documentary blob
  vec3 bg      = vec3(0.031, 0.035, 0.047);   // #080912 near-black
  vec3 excited = vec3(0.918, 0.769, 0.282);   // #eac448 amber-gold
  vec3 refrac  = vec3(0.051, 0.067, 0.149);   // #0d1126 deep blue

  float eu = smoothstep(0.04, 0.62, u);                  // excited wave front
  float rv = v * clamp(1.0 - u*2.2, 0.0, 1.0);          // refractory: v high, u low

  vec3 col = mix(bg, excited, eu);
  col = mix(col, refrac, clamp(rv * 0.72, 0.0, 0.88));

  // Analytical node rings (project markers)
  float clear = 0.0, ring = 0.0;
  for (int i = 0; i < 8; i++) {
    if (i >= uNC) break;
    vec2  d    = vUv - uNP[i]; d.x *= uAR;
    float dist = length(d);
    clear += exp(-dist*dist * 16000.0);
    float r = dist - 0.022;
    ring  += exp(-r*r * 55000.0) * 0.7;
  }
  col  = col * (1.0 - clamp(clear * 0.88, 0.0, 0.92));
  col += vec3(0.52, 0.70, 1.00) * ring * 0.28;

  fragColor = vec4(col, 1.0);
}`;

// ─── GL helpers ───────────────────────────────────────────────────────────
function mkShader(type, src) {
  const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function mkProg(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}
function mkTex(w, h, ifmt, fmt, type, data) {
  const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, ifmt, w, h, 0, fmt, type, data ?? null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return t;
}
function mkFBO(tex) {
  const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) !== gl.FRAMEBUFFER_COMPLETE) throw new Error('FBO incomplete');
  gl.bindFramebuffer(gl.FRAMEBUFFER, null); return f;
}
const u1f = (p,n,v)   => gl.uniform1f(gl.getUniformLocation(p,n), v);
const u1i = (p,n,v)   => gl.uniform1i(gl.getUniformLocation(p,n), v);
const u2f = (p,n,x,y) => gl.uniform2f(gl.getUniformLocation(p,n), x, y);
function bindTex(unit, tex) { gl.activeTexture(gl.TEXTURE0+unit); gl.bindTexture(gl.TEXTURE_2D, tex); }

// ─── Programs & geometry ──────────────────────────────────────────────────
let pReact, pDisplay, quadVAO;

function buildPrograms() {
  pReact   = mkProg(QUAD_VS, REACT_FS);
  pDisplay = mkProg(QUAD_VS, DISPLAY_FS);
}

function buildGeometry() {
  quadVAO = gl.createVertexArray();
  const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  gl.bindVertexArray(quadVAO);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  gl.bindVertexArray(null);
}

// ─── Simulation textures (RG32F ping-pong) ────────────────────────────────
let rdTex = [null, null], rdFBO = [null, null], wallTex = null;
let rd = 0;

function seedInitial() {
  // RG32F: 2 floats per pixel (u, v)
  const d = new Float32Array(TW * TH * 2);

  // Low-amplitude ambient noise everywhere — breaks symmetry, nucleates
  // spontaneous waves over the whole canvas (Barkley threshold ≈ (0+b)/a ≈ 0.013)
  for (let i = 0; i < TW * TH; i++) {
    d[i*2]   = 0.04 + Math.random() * 0.12;  // u: small perturbation
    d[i*2+1] = 0.0;                           // v: quiescent
  }

  // Strong seeds at project node positions (fully excited disk)
  function seedDisk(cx, cy, r, uVal, vVal) {
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        if (dx*dx + dy*dy > r*r) continue;
        const xx = cx+dx, yy = cy+dy;
        if (xx < 0 || xx >= TW || yy < 0 || yy >= TH) continue;
        const idx = (yy*TW + xx) * 2;
        d[idx]   = uVal;
        d[idx+1] = vVal;
      }
    }
  }

  PROJECTS.forEach(p => seedDisk(
    Math.round(p.x * TW), Math.round(p.y * TH),
    SEED_R, 0.95, 0.0
  ));

  // A handful of additional random seeds for visual variety
  for (let k = 0; k < 18; k++) {
    seedDisk(
      Math.floor(Math.random() * TW),
      Math.floor(Math.random() * TH),
      4, 0.9, 0.0
    );
  }

  return d;
}

function initTextures() {
  for (let i = 0; i < 2; i++) {
    if (rdTex[i]) { gl.deleteTexture(rdTex[i]); gl.deleteFramebuffer(rdFBO[i]); }
  }
  const seed = seedInitial();
  rdTex[0] = mkTex(TW, TH, gl.RG32F, gl.RG, gl.FLOAT, seed);
  rdFBO[0] = mkFBO(rdTex[0]);
  rdTex[1] = mkTex(TW, TH, gl.RG32F, gl.RG, gl.FLOAT, null);
  rdFBO[1] = mkFBO(rdTex[1]);
  // Clear ping-pong buffer 1
  gl.bindFramebuffer(gl.FRAMEBUFFER, rdFBO[1]);
  gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  rd = 0;
}

// ─── Wall / obstacle texture ──────────────────────────────────────────────
function buildWallTex() {
  const oc = document.createElement('canvas');
  oc.width = TW; oc.height = TH;
  const ctx = oc.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, TW, TH);
  ctx.fillStyle = '#fff';
  OBSTACLES.forEach(o => {
    if (o.type === 'rect') {
      ctx.fillRect(o.x*TW, o.y*TH, o.w*TW, o.h*TH);
    } else if (o.type === 'text') {
      ctx.font = `900 ${o.size}px "JetBrains Mono","Arial Black",monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(o.text, o.cx*TW, o.cy*TH);
    }
  });
  // Flip Y: CSS y=0 top → GL y=0 bottom
  const id   = ctx.getImageData(0, 0, TW, TH);
  const data = new Uint8Array(TW * TH);
  for (let y = 0; y < TH; y++) for (let x = 0; x < TW; x++) {
    data[y*TW+x] = id.data[((TH-1-y)*TW+x)*4] > 64 ? 255 : 0;
  }
  if (wallTex) gl.deleteTexture(wallTex);
  wallTex = mkTex(TW, TH, gl.R8, gl.RED, gl.UNSIGNED_BYTE, data);
}

// ─── HTML label overlay ───────────────────────────────────────────────────
function buildLabels() {
  const c = document.getElementById('nodes'); c.innerHTML = '';
  PROJECTS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'nlabel';
    el.style.left = (p.x * 100) + 'vw';
    el.style.top  = ((1 - p.y) * 100) + 'vh';
    el.textContent = p.slug;
    el.addEventListener('click', () => console.log('open:', p.slug));
    c.appendChild(el);
  });
}

// ─── Mouse / touch interaction ────────────────────────────────────────────
// Moving the cursor injects u=1 excitation — creates a persistent pacemaker
// while held, or a trail of wave-emitters when dragged slowly.
let mouseX = 0.5, mouseY = 0.5, mouseActive = false;
function onMove(cx, cy) {
  mouseX = cx / canvas.width;
  mouseY = 1 - cy / canvas.height;
  mouseActive = true;
}
canvas.addEventListener('mousemove',  e => onMove(e.clientX, e.clientY));
canvas.addEventListener('mouseleave', () => { mouseActive = false; });
canvas.addEventListener('touchmove',  e => {
  e.preventDefault();
  onMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchend', () => { mouseActive = false; });

// ─── Render loop ──────────────────────────────────────────────────────────
let frameN = 0, lastT = performance.now();

function frame(now) {
  requestAnimationFrame(frame);
  const dt = now - lastT; lastT = now;
  if (++frameN % 60 === 0) document.getElementById('fps').textContent = (1000/dt | 0);

  gl.bindVertexArray(quadVAO);

  // ── RD substeps ──────────────────────────────────────────────────────
  gl.useProgram(pReact);
  u1f(pReact, 'uEps',  P.eps);
  u1f(pReact, 'uA',    P.a);
  u1f(pReact, 'uB',    P.b);
  u1f(pReact, 'uDu',   P.Du);
  u1f(pReact, 'uDt',   P.dt);
  u2f(pReact, 'uMPos', mouseX*TW, mouseY*TH);
  u1f(pReact, 'uMRad', P.mouseRad);
  u1i(pReact, 'uMAct', mouseActive ? 1 : 0);
  u1i(pReact, 'uState', 0);
  u1i(pReact, 'uWall',  1);
  bindTex(1, wallTex);

  for (let s = 0; s < SUBSTEPS; s++) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, rdFBO[1-rd]);
    gl.viewport(0, 0, TW, TH);
    bindTex(0, rdTex[rd]);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    rd = 1 - rd;
  }

  // ── Display ───────────────────────────────────────────────────────────
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(pDisplay);
  bindTex(0, rdTex[rd]); u1i(pDisplay, 'uState', 0);
  u1i(pDisplay, 'uNC', PROJECTS.length);
  u1f(pDisplay, 'uAR', canvas.width / canvas.height);
  gl.uniform2fv(gl.getUniformLocation(pDisplay, 'uNP'),
    new Float32Array(PROJECTS.flatMap(p => [p.x, p.y])));
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ─── Parameter UI ─────────────────────────────────────────────────────────
const PRESETS = {
  spirals:   { eps: 0.025, a: 0.750, b: 0.010 }, // dense spiral field
  target:    { eps: 0.050, a: 0.840, b: 0.065 }, // wider, slower rings
  turbulent: { eps: 0.018, a: 0.600, b: 0.040 }, // fast chaotic fronts
};
const PRESET_BTN = { spirals: 'bSpiral', target: 'bTarget', turbulent: 'bTurb' };

function applyPreset(name) {
  const pr = PRESETS[name];
  P.eps = pr.eps; P.a = pr.a; P.b = pr.b;
  document.getElementById('sEps').value = P.eps;
  document.getElementById('sA').value   = P.a;
  document.getElementById('sB').value   = P.b;
  document.getElementById('vEps').textContent = P.eps.toFixed(3);
  document.getElementById('vA').textContent   = P.a.toFixed(3);
  document.getElementById('vB').textContent   = P.b.toFixed(3);
  document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  document.getElementById(PRESET_BTN[name])?.classList.add('active');
}

// Slider → param live binding
[['sEps','eps','vEps'], ['sA','a','vA'], ['sB','b','vB']].forEach(([sid, key, vid]) => {
  document.getElementById(sid).addEventListener('input', function() {
    P[key] = parseFloat(this.value);
    document.getElementById(vid).textContent = P[key].toFixed(3);
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  });
});

document.getElementById('bSpiral').addEventListener('click', () => applyPreset('spirals'));
document.getElementById('bTarget').addEventListener('click',  () => applyPreset('target'));
document.getElementById('bTurb').addEventListener('click',    () => applyPreset('turbulent'));
document.getElementById('bReset').addEventListener('click',   () => initTextures());

// ─── Boot ─────────────────────────────────────────────────────────────────
buildPrograms();
buildGeometry();
buildWallTex();
initTextures();
buildLabels();
requestAnimationFrame(frame);

window.addEventListener('resize', () => { setSize(); buildWallTex(); initTextures(); buildLabels(); });
</script>
</body>
</html>
